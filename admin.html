
<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{font-family:Arial;background:#222;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#333;padding:30px;border-radius:8px}
input,button{padding:8px;margin:5px;width:100%}
</style>
<script src="helpers.js"></script>

<style>
@media print {
    body, * {
        font-weight: bold !important;
    }
}
</style>

</head>
<body>
<div class="box">
<h2>Admin Login</h2>
<input id="uid" placeholder="Admin ID">
<input id="pwd" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
<script>
function login(){
 if(uid.value==="admin" && pwd.value==="1234"){
  localStorage.setItem("admin","yes");
  location.href="admin_dashboard.html";
 } else alert("Wrong credentials");
}
</script>

<button onclick="history.back()" style="position:fixed;bottom:20px;left:20px;padding:10px 16px;border-radius:6px;">
← Back
</button>


<div style="position:fixed;bottom:20px;right:20px;">
  <button onclick="window.location.href='index.html'" style="padding:8px 14px;margin-right:6px;">Home</button>
  <button onclick="logout()" style="padding:8px 14px;">Logout</button>
</div>


<script>
function logout(){
  if(confirm("Do you want to logout?")){
    localStorage.clear();
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
