
<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Bill</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
<script src="helpers.js"></script>

<style>
@media print {
    body, * {
        font-weight: bold !important;
    }
}
</style>

</head>
<body>

<h2>Dashboard - Bill</h2>

<div class="top-buttons">
  <button onclick="saveOrder()">Save Order</button>
  <button><button onclick="window.location.href='order_history.html'">Order History</button></button>
  <button onclick="showDailySales()">Daily Sales</button>
  <button onclick="window.print()">Print / PDF</button>
  <button><button onclick="exportExcel()">Export Excel</button></button>
  <button onclick="clearCart()">Clear Cart</button>
</div>

<table border="1" width="100%" style="margin-top:20px;">
  <thead>
    <tr>
      <th>Item</th>
      <th>Size</th>
      <th>Qty</th>
      <th>Price</th>
      <th>Amount</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="billBody">
    <!-- Rows will come here -->
  </tbody>
</table>

<h3 style="margin-top:20px;">Total Amount: ₹<span id="totalAmount">0</span></h3>

<script>
  renderDashboard();
</script>


<button onclick="history.back()" style="position:fixed;bottom:20px;left:20px;padding:10px 16px;border-radius:6px;">
← Back
</button>


<div style="position:fixed;bottom:20px;right:20px;">
  <button onclick="window.location.href='index.html'" style="padding:8px 14px;margin-right:6px;">Home</button>
  <button onclick="logout()" style="padding:8px 14px;">Logout</button>
</div>


<script>
function logout(){
  if(confirm("Do you want to logout?")){
    localStorage.clear();
    window.location.href = "login.html";
  }
}
</script>


<div style="margin:15px 0; padding:10px; background:#ffffffcc; border-radius:8px;">
    <h3>Payment Mode</h3>
    <label><input type="radio" name="paymode" onchange="showQRIfOnline()" value="Cash" checked> Cash (Offline)</label>
    &nbsp;&nbsp;
    <label><input type="radio" name="paymode" onchange="showQRIfOnline()" value="Online"> Online (UPI / Card)</label>
    <br><br>
    <button onclick="processPayment()">Pay & Save Order</button>
</div>


<div id="qrBox" style="display:none; margin-top:10px; text-align:center;">
    <p><strong>Scan to Pay (UPI)</strong></p>
    <img id="qrImage" src="" width="180" />
    <p>UPI ID: demo@upi</p>
</div>

</body>
</html>
