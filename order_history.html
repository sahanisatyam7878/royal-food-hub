
<!DOCTYPE html>
<html>
<head>
<title>Order History</title>
<style>
body { font-family: Arial; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #555; padding: 8px; text-align: left; }
th { background: #222; color: white; }
tr:nth-child(even) { background: #f2f2f2; }
.topbar { margin-bottom: 10px; }
</style>
<script src="helpers.js"></script>

<style>
@media print {
    body, * {
        font-weight: bold !important;
    }
}
</style>

</head>
<body>

<h2>Order History</h2>

<div class="topbar">
  Search Date: <input type="text" id="searchBox" onkeyup="filterTable()" placeholder="19/1/2026">
  <button onclick="clearHistory()">Clear All History</button>
</div>

<table id="historyTable">
<thead>
<tr>
  <th>#</th>
  <th>Date</th>
  <th>Items</th>
  <th>Total</th>
</tr>
</thead>
<tbody id="historyBody"></tbody>
<tfoot>
<tr>
  <th colspan="3">Grand Total</th>
  <th id="grandTotal">₹0</th>
</tr>
</tfoot>
</table>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];
const body = document.getElementById("historyBody");
let gtotal = 0;

orders.forEach((o,idx)=>{
  if(!o || !o.date || isNaN(o.total)) return;

  let itemNames = "";
  if(Array.isArray(o.items)){
    itemNames = o.items.map(i => i.name + " x" + i.qty).join(", ");
  }

  gtotal += Number(o.total);

  body.innerHTML += `<tr>
    <td>${idx+1}</td>
    <td>${o.date}</td>
    <td>${itemNames}</td>
    <td>₹${o.total}</td>
  </tr>`;
});

document.getElementById("grandTotal").innerText = "₹" + gtotal;

function filterTable(){
  let input = document.getElementById("searchBox").value.toLowerCase();
  let rows = document.querySelectorAll("#historyBody tr");
  rows.forEach(r=>{
    let date = r.children[1].innerText.toLowerCase();
    r.style.display = date.includes(input) ? "" : "none";
  });
}

function clearHistory(){
  if(confirm("Are you sure you want to delete all order history?")){
    localStorage.removeItem("orders");
    location.reload();
  }
}
</script>

<button onclick="history.back()">Back</button>

</body>
</html>
