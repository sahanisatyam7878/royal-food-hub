<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Live Orders - Admin</title>
    <style>
        body{font-family:Arial;background:#f5f5f5;padding:20px;}
        h1{text-align:center;}
        table{width:100%;border-collapse:collapse;background:#fff;}
        th,td{border:1px solid #ccc;padding:10px;text-align:center;}
        th{background:#333;color:#fff;}
    </style>
</head>
<body>
    <h1>Live Orders</h1>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Time</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="orderBody"></tbody>
    </table>

    <script>
        function loadOrders(){
            let orders = JSON.parse(localStorage.getItem("live_orders")) || [];
            let body = document.getElementById("orderBody");
            body.innerHTML = "";
            orders.forEach((o,i)=>{
                body.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td>${o.time}</td>
                    <td>₹${o.amount}</td>
                </tr>`;
            });
        }

        loadOrders();
        setInterval(loadOrders, 2000); // auto refresh every 2 seconds
    </script>
</body>
</html>
